<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="project_styles/default_p.css">
    <link rel="script" href="project_scripts/pet_post_retrival.js">
    <title>Raising Canines | Paw Park</title>
</head>
<body>
    <div data-include="project_componients/header.html" data-replace="%title%:Rasing Canines - Paw Park Posts"></div>
    <hr>
    <main id="posts">
        <h2>Paw park Posts</h2>
        <div id="template-post">
            <h3>Koji</h3>
            <img src="project_images/Koji.jpg" alt="Dog post" width=300 height=250>
            <p><strong>Owner:</strong> Tiffany Johnson</p>
            <p>My dog koji who i love very much.</p>
            <small>Posted on: 4/24/2026</small>
        </div>
        <div id="post-display-container">

        </div>
    </main>
    <hr>
    <div data-include="project_componients/footer.html"></div>
    <script src="../itis3135/scripts/HTMLInclude.min.js"></script>
    <script>
        const container = document.getElementById('post-display-container');
    
        // 1. Grab data from storage
        const rawData = localStorage.getItem('dogPosts');
        const posts = JSON.parse(rawData) || [];

        console.log("Found posts:", posts); // Check your F12 console for this!

        if (posts.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>No posts yet. Go to the Sign Up page to add one!</p>";
        } else {
            // 2. Loop through and create HTML for each dog
            container.innerHTML = posts.map((post) => `
                <div style="border: 2px solid #3d2b1f; margin: 20px; padding: 15px; background: #9AADBF;">
                    <h3>${post.petName}</h3>
                    <img src="${localStorage.getItem('petPicture')}" alt="pet image" width=300 height=250>
                    <p><strong>Owner:</strong> ${post.owner}</p>
                    <p>${post.message}</p>
                <small>Posted on: ${new Date().toLocaleDateString()}</small>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
