<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey</title>
    <link rel="stylesheet" href="styles/coffee_styles.css">
    <link rel="stylesheet" href="styles/survey_styles.css">
    <script src="https://lint.page/kit/4d0fe3.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cabin:ital,wght@0,400..700;1,400..700&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Lexend+Deca:wght@100..900&family=Urbanist:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div data-include="components/header_2nd.html" data-replace="%title%: Survey Page"></div>
    <main>
    <h2 id="description">A survey page for submitting thoughts on Jump Start Espresso, thank you for your time.</h2>
    <form id="user-info-input">
      <fieldset>
        <legend>User Info</legend>
        <label id="name-label">Enter Name:</label>
        <input required placeholder="e.g., John Doe" id="name" name="name-input" type="text" size="100">
        <label id="email-label"><br>Enter Email:</label>
        <input required placeholder="example@email.com" id="email" name="email-input" type="email" size="100">
        <label id="number-label"><br>Enter Age (optinal):</label>
        <input placeholder="e.g., 32" min="16" max="100" id="number" type="number">
      </fieldset>
    </form>
    <form id="user-judgement">
      <fieldset>
        <legend>Thoughts</legend>
      <label id="dropdown-label"><br>What best describes your feelings<br></label>
      <select id="dropdown">
        <option>Happy</option>
        <option>Sad</option>
      </select>
      <label id="recommendation-label"><br>Would you recommend this website to a friend who wanted coffee<br>Yes</label>
      <input value="yes" type="radio" name="recommendation-option">
      <label id="recommendation-option-2">No</label>
      <input value="no" type="radio" name="recommendation-option">
      <label id="improvment-label"><br>What can be improved apon?<br></label>
      <input type="checkbox" value="Food">Coffee
      <input type="checkbox" value="Service">Serice
      <input type="checkbox" value="Decor">Web degign
      <input type="checkbox" value="Entertainment">Responsiveness<br>
      <label>Please explain what about the selected above needs improvment.</label><br>
      <textarea id="input" rows="5" cols="60">

      </textarea>
      <br>
      <button id="submit">Submit</button>
      </fieldset>
    </form>
    </main>
    <div data-include="components/footer_2nd.html"></div>
    <script src="scripts/HTMLInclude.min.js"></script>
</body>
</html>
